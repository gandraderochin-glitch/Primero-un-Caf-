name: Deploy site from uploaded ZIP

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create public directory
        run: |
          mkdir -p public

      - name: Unzip exported site
        run: |
          if [ -f "descargaespressomat_files.zip" ]; then
            unzip -q descargaespressomat_files.zip -d public || true
          else
            echo "No ZIP found: descargaespressomat_files.zip"
            ls -la
            exit 0
          fi

      - name: Ensure index exists in public
        run: |
          # If the unzipped content already contains index.html, keep it. Otherwise copy the root index (container)
          if [ ! -f public/index.html ]; then
            cp -f descargaespressomat.html public/index.html || true
          fi

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v1
        with:
          path: public

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
